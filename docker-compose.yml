services:

  db:
    image: postgres:13
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: grants_svc

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .

    container_name: fastapi

    depends_on:
      - db

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: always

volumes:
  postgres_data: