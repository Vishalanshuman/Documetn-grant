name: FastAPI CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: grants_svc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d grants_svc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U postgres -d grants_svc_test && break || sleep 1
          done

      - name: Run Tests
        run: |
          pytest -vv -s

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secret.EC2_HOST }}
          username: ${{ secret.EC2_USER }}
          key: ${{ secret.EC2_SSH_KEY }}
          script: |
            cd ~/Documetn-grant

            git pull origin master

            docker compose down

            docker compose up -d --build

            docker image prune -f

            sudo systemctl restart nginx
