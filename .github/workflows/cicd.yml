name: FastAPI CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:root@localhost:5432/grants_svc_test

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: grants_svc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d grants_svc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U postgres -d grants_svc_test && break || sleep 1
          done

      - name: Run Tests
        run: |
          pytest -vv -s

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/Documetn-grant

            echo "Pulling latest code..."
            git pull origin master

            echo "Stopping old containers..."
            docker compose down

            echo "Building and starting containers..."
            docker compose up -d --build db

            echo "Waiting for PostgreSQL..."
            until docker compose exec -T db pg_isready -U postgres -d grants_svc; do
              echo "Database is not ready yet..."
              sleep 2
            done

            echo "Running Alembic migrations..."
            docker compose run --rm -e DATABASE_URL="postgresql+asyncpg://postgres:root@db:5432/grants_svc" app alembic upgrade head

            echo "Starting FastAPI..."
            docker compose up -d app

            echo "Removing unused images..."
            docker image prune -f

            echo "Restarting Nginx..."
            sudo systemctl restart nginx

            echo "Checking running containers..."
            docker compose ps